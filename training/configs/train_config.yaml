# ── Model ────────────────────────────────────────────────────────────────────
model_name: "Qwen/Qwen3-14B"
output_dir: "../outputs/qwen3-14b-gyan-lora"

# ── QLoRA ────────────────────────────────────────────────────────────────────
load_in_4bit: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_use_double_quant: true

lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ── Training ─────────────────────────────────────────────────────────────────
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 8        # effective batch = 32
learning_rate: 2.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.03
weight_decay: 0.01
max_grad_norm: 1.0
max_seq_length: 2048
fp16: false
bf16: true

# ── Data ─────────────────────────────────────────────────────────────────────
dataset_path: "../data/combined_train.jsonl"
val_dataset_path: "../data/combined_val.jsonl"
train_val_split: 0.05                 # 5% held out for validation

# ── Logging ──────────────────────────────────────────────────────────────────
logging_steps: 20
eval_steps: 200
save_steps: 400
save_total_limit: 3
report_to: "wandb"
run_name: "gyan-qwen3-14b-v1"

# ── Hardware ─────────────────────────────────────────────────────────────────
# Recommended: 2x A100 80GB on RunPod or Vast.ai
# Single H100 80GB also works
dataloader_num_workers: 4
